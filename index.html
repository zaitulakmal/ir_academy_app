<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/ir_academy_app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ir_academy_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>IR Academy</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Testing phase: keep the app always-fresh. Flutter's service worker caches
    the build aggressively (especially sticky on iOS Safari), which can serve a
    stale/broken version even after a redeploy. We disable SW registration and
    clear any previously-installed SW + caches so testers always get the latest.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      // Neutralise any registration attempt (e.g. from flutter_bootstrap.js).
      navigator.serviceWorker.register = function () {
        return Promise.reject(new Error('Service worker disabled during testing'));
      };
      // Remove stale service workers + caches, then reload once if this page
      // is still being controlled by an old (cached) service worker.
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var wasControlled = !!navigator.serviceWorker.controller;
        return Promise.all(regs.map(function (r) { return r.unregister(); }))
          .then(function () {
            if (window.caches && caches.keys) {
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              });
            }
          })
          .then(function () {
            if (wasControlled) window.location.reload();
          });
      }).catch(function () {});
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
